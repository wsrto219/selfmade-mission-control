<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SelfMade — Mission Control</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { background: #F8F7F4; font-family: 'DM Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    ::selection { background: #1A1A2E33; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D1D0CC; border-radius: 10px; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
      70% { box-shadow: 0 0 0 10px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }
    @keyframes confetti-fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(140px) rotate(420deg); opacity: 0; }
    }
    @keyframes stripe-complete {
      from { background-position: 0 0; }
      to { background-position: 40px 0; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STORAGE_KEY = "sm_mission_v3";

    const PILLARS = [
      {
        id: 1, icon: "👑", title: "Chief of Staff Hire", tagline: "Highest-leverage move", color: "#E85D04",
        tldr: "EA/Chief of Staff at ~$60K frees both founders from admin. Mariah transitions to VA or exits once replacement found.",
        actions: [
          { owner: "Will", text: "Post EA/Chief of Staff listing on LinkedIn", leverage: "high" },
          { owner: "Janet", text: "Tap personal network for EA candidates", leverage: "high" },
          { owner: "Both", text: "Define PIP criteria for Mariah", leverage: "standard" },
        ],
      },
      {
        id: 2, icon: "⚙️", title: "Ops & Efficiency", tagline: "Do more with fewer people", color: "#2563EB",
        tldr: "Margins stuck at 20-25%, should be 30-40%. Creative brief system outdated. Pod C weakest link.",
        actions: [
          { owner: "Janet", text: "Redesign creative brief system (kill the Excel)", leverage: "high" },
          { owner: "Will", text: "Clarify Didy's Pod A / Magic Cactus message", leverage: "low" },
          { owner: "Both", text: "Roll out Skipper + Ad Library, starting Pod B", leverage: "high" },
        ],
      },
      {
        id: 3, icon: "🔭", title: "Learn from Operators", tagline: "Find what you're missing", color: "#7C3AED",
        tldr: "Other agencies do your revenue with 2-3 editors. Book 3 open-book calls to benchmark.",
        actions: [
          { owner: "Will", text: "Book 3 operator calls from network", leverage: "high" },
          { owner: "Janet", text: "Reach out via Foxwell for perspectives", leverage: "standard" },
          { owner: "Both", text: "Prep questions: team ratios, workflows, costs", leverage: "standard" },
        ],
      },
      {
        id: 4, icon: "💰", title: "Financial Health", tagline: "$3K from the $30K target", color: "#059669",
        tldr: "Adj. EBITDA ~$27K. $34K prospect pending. Churn risk on Magic Cactus, Delta, Attention Grace.",
        actions: [
          { owner: "Will", text: "Send Liquid Plus persona analysis", leverage: "standard" },
          { owner: "Janet", text: "Get Magic Cactus landing page live", leverage: "high" },
          { owner: "Will", text: "Update P&L with Style AI + Anthropic costs", leverage: "low" },
          { owner: "Janet", text: "Run cost cap on Attention Grace", leverage: "standard" },
        ],
      },
      {
        id: 5, icon: "🚀", title: "Skipper App", tagline: "The long-term play", color: "#DC2626",
        tldr: "Will vibe-codes faster than dev team. Shift devs to infra only. App is lead gen for agency.",
        actions: [
          { owner: "Will", text: "Shift devs to infra-only after EC2 setup", leverage: "high" },
          { owner: "Will", text: "Build Slack bot for daily ad library concepts", leverage: "standard" },
          { owner: "Janet", text: "Use Skipper for creative strategy catch-up", leverage: "standard" },
        ],
      },
      {
        id: 6, icon: "🛡️", title: "AI Guardrails", tagline: "Tool, not replacement", color: "#B45309",
        tldr: "Over-automation kills thinking. Team submitting first-output AI slop. Keep friction intentional.",
        actions: [
          { owner: "Both", text: "Enforce 'beyond first output' standard", leverage: "high" },
          { owner: "Both", text: "Keep manual processes where they force thinking", leverage: "standard" },
        ],
      },
      {
        id: 7, icon: "👥", title: "Team Development", tagline: "Right people, right seats", color: "#0891B2",
        tldr: "Mariah: PIP. Didy: delegate, don't report. Jess: power of the pause. Layla: grow, don't maintain.",
        actions: [
          { owner: "Will", text: "Dev conversation with Jess re: power of the pause", leverage: "standard" },
          { owner: "Janet", text: "Follow up with Layla on UGC game plan", leverage: "standard" },
          { owner: "Both", text: "Determine Sarah's admin cap per ad account", leverage: "low" },
        ],
      },
      {
        id: 8, icon: "⏱️", title: "Buy Back Your Time", tagline: "Scale yourselves first", color: "#6D28D9",
        tldr: "Janet works 48hrs not 60-70. Will hasn't tracked. Drop low-value recurring commitments.",
        actions: [
          { owner: "Will", text: "Start time-tracking this week", leverage: "standard" },
          { owner: "Both", text: "Identify 2-3 commitments to drop or delegate", leverage: "high" },
          { owner: "Janet", text: "Move Foxwell/brewing calls to async email", leverage: "low" },
        ],
      },
    ];

    const POINTS = { high: 5, standard: 3, low: 1 };
    const LEV_COLORS = {
      high:     { bg: "#FEF3C7", text: "#92400E", border: "#FDE68A" },
      standard: { bg: "#EFF6FF", text: "#1E40AF", border: "#BFDBFE" },
      low:      { bg: "#F0FDF4", text: "#166534", border: "#BBF7D0" },
    };

    function load() { try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : {}; } catch(e) { return {}; } }
    function save(c) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(c)); } catch(e) {} }

    function App() {
      const [checked, setChecked] = useState(load);
      const [showConfetti, setShowConfetti] = useState(false);
      const prevPct = useRef(0);

      useEffect(() => { save(checked); }, [checked]);

      const is = (pId, i) => !!checked[`${pId}-${i}`];
      const toggle = (pId, i) => {
        const k = `${pId}-${i}`;
        setChecked(p => { const n = {...p}; n[k] ? delete n[k] : n[k] = true; return n; });
      };

      const scores = { Will: 0, Janet: 0 };
      const maxPts = { Will: 0, Janet: 0 };
      let totalDone = 0, totalActions = 0;
      PILLARS.forEach(p => p.actions.forEach((a, i) => {
        const pts = POINTS[a.leverage];
        totalActions++;
        const owners = a.owner === "Both" ? ["Will","Janet"] : [a.owner];
        owners.forEach(o => maxPts[o] += pts);
        if (is(p.id, i)) { totalDone++; owners.forEach(o => scores[o] += pts); }
      }));
      const pct = totalActions ? Math.round((totalDone / totalActions) * 100) : 0;

      useEffect(() => {
        if (pct === 100 && prevPct.current < 100) setShowConfetti(true);
        prevPct.current = pct;
      }, [pct]);
      useEffect(() => {
        if (showConfetti) { const t = setTimeout(() => setShowConfetti(false), 3000); return () => clearTimeout(t); }
      }, [showConfetti]);

      const leader = scores.Will > scores.Janet ? "Will" : scores.Janet > scores.Will ? "Janet" : null;

      return (
        <div style={{ minHeight: "100vh", background: "#F8F7F4", color: "#1A1A2E" }}>

          {showConfetti && (
            <div style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 999, pointerEvents: "none" }}>
              {Array.from({ length: 30 }).map((_, i) => (
                <div key={i} style={{
                  position: "absolute", top: -10, left: `${5 + Math.random() * 90}%`,
                  width: 7 + Math.random() * 7, height: 7 + Math.random() * 7,
                  borderRadius: Math.random() > 0.5 ? "50%" : "2px",
                  background: ["#E85D04","#2563EB","#7C3AED","#059669","#DC2626","#F59E0B"][i % 6],
                  animation: `confetti-fall ${1.5 + Math.random() * 2}s ease-out ${Math.random() * 0.6}s forwards`,
                }} />
              ))}
            </div>
          )}

          {/* STICKY HEADER */}
          <div style={{
            position: "sticky", top: 0, zIndex: 100, background: "#F8F7F4",
            borderBottom: "1px solid #E5E3DE",
          }}>
            <div style={{ maxWidth: 800, margin: "0 auto", padding: "14px 20px" }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, flexWrap: "wrap" }}>
                <div>
                  <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: 3, color: "#9E9B93", fontFamily: "'JetBrains Mono', monospace" }}>SELFMADE</div>
                  <div style={{ fontSize: 16, fontWeight: 800, color: "#1A1A2E", letterSpacing: -0.3 }}>Mission Control</div>
                </div>

                <div style={{ display: "flex", gap: 6 }}>
                  {[
                    { name: "Will", emoji: "🧢", pts: scores.Will, max: maxPts.Will },
                    { name: "Janet", emoji: "🔥", pts: scores.Janet, max: maxPts.Janet },
                  ].map(p => {
                    const isLead = leader === p.name;
                    return (
                      <div key={p.name} style={{
                        display: "flex", alignItems: "center", gap: 6,
                        padding: "5px 12px", borderRadius: 8,
                        background: isLead ? "#1A1A2E" : "#FFF",
                        color: isLead ? "#F8F7F4" : "#1A1A2E",
                        border: isLead ? "none" : "1px solid #E5E3DE",
                        transition: "all 0.3s",
                      }}>
                        <span style={{ fontSize: 14 }}>{p.emoji}</span>
                        <span style={{ fontSize: 12, fontWeight: 700 }}>{p.name}</span>
                        <span style={{
                          fontSize: 13, fontWeight: 800, fontFamily: "'JetBrains Mono', monospace",
                          color: isLead ? "#F59E0B" : "#7C7A72",
                        }}>{p.pts}</span>
                        <span style={{ fontSize: 9, color: isLead ? "#6B7280" : "#C4C1B9" }}>/{p.max}</span>
                      </div>
                    );
                  })}
                </div>

                <div style={{ fontSize: 11, color: "#9E9B93", fontWeight: 600, fontFamily: "'JetBrains Mono', monospace" }}>
                  {totalDone}/{totalActions} &middot; {pct}%
                </div>
              </div>

              <div style={{ marginTop: 8, height: 3, background: "#E5E3DE", borderRadius: 3, overflow: "hidden" }}>
                <div style={{
                  height: "100%", borderRadius: 3, transition: "width 0.6s cubic-bezier(.4,0,.2,1)",
                  background: pct === 100
                    ? "repeating-linear-gradient(45deg, #16A34A, #16A34A 10px, #22C55E 10px, #22C55E 20px)"
                    : "linear-gradient(90deg, #1A1A2E, #374151)",
                  backgroundSize: pct === 100 ? "40px 40px" : "auto",
                  animation: pct === 100 ? "stripe-complete 1s linear infinite" : "none",
                  width: `${pct}%`,
                }} />
              </div>
            </div>
          </div>

          {/* PILLARS */}
          <div style={{ maxWidth: 800, margin: "0 auto", padding: "20px 20px 80px" }}>
            <div style={{ display: "flex", gap: 14, marginBottom: 20, flexWrap: "wrap" }}>
              {[
                { label: "HIGH LEVERAGE", pts: 5, lev: "high" },
                { label: "STANDARD", pts: 3, lev: "standard" },
                { label: "QUICK WIN", pts: 1, lev: "low" },
              ].map(l => (
                <div key={l.lev} style={{
                  display: "flex", alignItems: "center", gap: 6,
                  fontSize: 10, fontWeight: 700, fontFamily: "'JetBrains Mono', monospace",
                  color: LEV_COLORS[l.lev].text,
                }}>
                  <div style={{
                    background: LEV_COLORS[l.lev].bg, border: `1px solid ${LEV_COLORS[l.lev].border}`,
                    borderRadius: 4, padding: "2px 6px", fontSize: 9,
                  }}>+{l.pts}</div>
                  {l.label}
                </div>
              ))}
            </div>

            {PILLARS.map((p, pIdx) => {
              const done = p.actions.filter((_, i) => is(p.id, i)).length;
              const complete = done === p.actions.length;
              let earned = 0, possible = 0;
              p.actions.forEach((a, i) => {
                possible += POINTS[a.leverage];
                if (is(p.id, i)) earned += POINTS[a.leverage];
              });

              return (
                <div key={p.id} style={{
                  marginBottom: 16, background: complete ? "#FAFFF7" : "#FFF",
                  border: complete ? "1px solid #BBF7D0" : "1px solid #E5E3DE",
                  borderRadius: 14, overflow: "hidden",
                  animation: `fadeUp 0.35s cubic-bezier(.4,0,.2,1) ${pIdx * 0.04}s both`,
                  transition: "all 0.3s",
                }}>
                  <div style={{
                    padding: "14px 20px", borderBottom: `1px solid ${complete ? "#BBF7D0" : "#F0EFEB"}`,
                    display: "flex", alignItems: "center", gap: 12,
                  }}>
                    <span style={{ fontSize: 22, lineHeight: 1 }}>{complete ? "✅" : p.icon}</span>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                        <span style={{ fontSize: 14, fontWeight: 800, color: "#1A1A2E" }}>{p.title}</span>
                        <span style={{ fontSize: 10, fontWeight: 600, color: "#9E9B93", fontFamily: "'JetBrains Mono', monospace" }}>
                          {done}/{p.actions.length}
                        </span>
                      </div>
                      <div style={{ fontSize: 12, color: "#9E9B93", marginTop: 1, lineHeight: 1.4 }}>{p.tldr}</div>
                    </div>
                    <div style={{
                      fontSize: 13, fontWeight: 800, fontFamily: "'JetBrains Mono', monospace",
                      color: complete ? "#16A34A" : "#1A1A2E",
                      background: complete ? "#DCFCE7" : "#F8F7F4",
                      padding: "4px 10px", borderRadius: 6, whiteSpace: "nowrap",
                    }}>
                      ⚡{earned}/{possible}
                    </div>
                  </div>

                  {p.actions.map((a, i) => {
                    const d = is(p.id, i);
                    const lev = LEV_COLORS[a.leverage];
                    return (
                      <div key={i} onClick={() => toggle(p.id, i)} style={{
                        display: "flex", alignItems: "center", gap: 10,
                        padding: "11px 20px", cursor: "pointer",
                        borderBottom: i < p.actions.length - 1 ? `1px solid ${complete ? "#E6F9E6" : "#F5F4F0"}` : "none",
                        background: d ? (complete ? "#F0FDF4" : "#FAFFF7") : "transparent",
                        transition: "background 0.12s",
                      }}
                        onMouseEnter={e => { if (!d) e.currentTarget.style.background = "#FAFAF8"; }}
                        onMouseLeave={e => { e.currentTarget.style.background = d ? (complete ? "#F0FDF4" : "#FAFFF7") : "transparent"; }}
                      >
                        <div style={{
                          width: 20, height: 20, borderRadius: 5, flexShrink: 0,
                          border: d ? "2px solid #22C55E" : "2px solid #D1D0CC",
                          background: d ? "#22C55E" : "#FFF",
                          display: "flex", alignItems: "center", justifyContent: "center",
                          transition: "all 0.2s", fontSize: 12, color: "#FFF", fontWeight: 700,
                          animation: d ? "pulse-ring 0.5s ease" : "none",
                        }}>{d ? "✓" : ""}</div>

                        <div style={{
                          background: lev.bg, color: lev.text, border: `1px solid ${lev.border}`,
                          fontSize: 9, fontWeight: 700, padding: "1px 5px", borderRadius: 3,
                          fontFamily: "'JetBrains Mono', monospace", flexShrink: 0, opacity: d ? 0.4 : 1,
                        }}>+{POINTS[a.leverage]}</div>

                        <div style={{
                          background: a.owner === "Both" ? "#F0EFEB" : a.owner === "Will" ? "#1A1A2E" : "#E85D04",
                          color: a.owner === "Both" ? "#4B4A45" : "#FFF",
                          fontSize: 9, fontWeight: 700, padding: "2px 6px", borderRadius: 4,
                          fontFamily: "'JetBrains Mono', monospace", flexShrink: 0,
                          opacity: d ? 0.4 : 1, letterSpacing: 0.5,
                        }}>{a.owner.toUpperCase()}</div>

                        <div style={{
                          fontSize: 13, fontWeight: 500, flex: 1,
                          color: d ? "#B0AEA6" : "#1A1A2E",
                          textDecoration: d ? "line-through" : "none",
                          transition: "all 0.2s",
                        }}>{a.text}</div>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>

          <div style={{
            textAlign: "center", padding: "20px 0 36px",
            borderTop: "1px solid #E5E3DE", fontSize: 11, color: "#C4C1B9",
            fontFamily: "'JetBrains Mono', monospace", letterSpacing: 1,
          }}>
            SELFMADE &middot; MISSION CONTROL &middot; MARCH 2026
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
