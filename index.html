<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SelfMade — Mission Control</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { background: #F8F7F4; font-family: 'DM Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    ::selection { background: #1A1A2E33; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D1D0CC; border-radius: 10px; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes confetti-fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(120px) rotate(360deg); opacity: 0; }
    }
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
      70% { box-shadow: 0 0 0 10px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const STORAGE_KEY = "sm_mission_v2";

    const PILLARS = [
      {
        id: 1, icon: "👑", title: "Chief of Staff Hire", tagline: "Highest-leverage move", color: "#E85D04",
        tldr: "Both founders drowning in admin. EA/Chief of Staff at ~$60K frees you to work ON the business. Mariah transitions to VA or exits once replacement is found.",
        actions: [
          { owner: "Will", text: "Post EA/Chief of Staff listing on LinkedIn", leverage: "high" },
          { owner: "Janet", text: "Tap personal network for EA candidates", leverage: "high" },
          { owner: "Both", text: "Define PIP criteria for Mariah", leverage: "standard" },
        ],
      },
      {
        id: 2, icon: "⚙️", title: "Ops & Efficiency", tagline: "Do more with fewer people", color: "#2563EB",
        tldr: "Margins stuck at 20-25%, should be 30-40%. Team feels inflated vs. revenue. Creative brief system outdated. Pod C is weakest link. BVS roles need to evolve.",
        actions: [
          { owner: "Janet", text: "Redesign creative brief system (kill the Excel)", leverage: "high" },
          { owner: "Will", text: "Clarify Didy's Pod A / Magic Cactus message", leverage: "low" },
          { owner: "Both", text: "Roll out Skipper + Ad Library, starting Pod B", leverage: "high" },
        ],
      },
      {
        id: 3, icon: "🔭", title: "Learn from Operators", tagline: "Find what you're missing", color: "#7C3AED",
        tldr: "Other agencies do your revenue with 2-3 editors. Book 3 open-book calls with operators (Fire Team, mastermind crew) to benchmark ops and cost structures.",
        actions: [
          { owner: "Will", text: "Book 3 operator calls from network", leverage: "high" },
          { owner: "Janet", text: "Reach out via Foxwell for perspectives", leverage: "standard" },
          { owner: "Both", text: "Prep questions: team ratios, workflows, costs", leverage: "standard" },
        ],
      },
      {
        id: 4, icon: "💰", title: "Financial Health", tagline: "$3K from the $30K target", color: "#059669",
        tldr: "Adj. EBITDA ~$27K. $34K 5-account prospect pending. Churn risk: Magic Cactus (April hold), Delta, Attention Grace. ARR ceiling at $1.5M — ops is the bottleneck.",
        actions: [
          { owner: "Will", text: "Send Liquid Plus persona analysis", leverage: "standard" },
          { owner: "Janet", text: "Get Magic Cactus landing page live", leverage: "high" },
          { owner: "Will", text: "Update P&L with Style AI + Anthropic costs", leverage: "low" },
          { owner: "Janet", text: "Run cost cap on Attention Grace", leverage: "standard" },
        ],
      },
      {
        id: 5, icon: "🚀", title: "Skipper App", tagline: "The long-term play", color: "#DC2626",
        tldr: "Will can vibe-code faster than the dev team. Shift devs to infra/scaling only. App is lead gen for agency. All pods should be using it now.",
        actions: [
          { owner: "Will", text: "Shift devs to infra-only after EC2 setup", leverage: "high" },
          { owner: "Will", text: "Build Slack bot for daily ad library concepts", leverage: "standard" },
          { owner: "Janet", text: "Use Skipper for creative strategy catch-up", leverage: "standard" },
        ],
      },
      {
        id: 6, icon: "🛡️", title: "AI Guardrails", tagline: "Tool, not replacement", color: "#B45309",
        tldr: "Over-automation kills critical thinking. Manual journaling works better than auto-dashboards. Team submitting first-output AI slop. Keep some friction intentional.",
        actions: [
          { owner: "Both", text: "Enforce 'beyond first output' standard", leverage: "high" },
          { owner: "Both", text: "Keep manual processes where they force thinking", leverage: "standard" },
        ],
      },
      {
        id: 7, icon: "👥", title: "Team Development", tagline: "Right people, right seats", color: "#0891B2",
        tldr: "Mariah: PIP or transition. Didy: delegate, don't just report. Jess: power of the pause. Layla: maintaining ≠ growing. Sarah: figure out account cap.",
        actions: [
          { owner: "Will", text: "Dev conversation with Jess re: power of the pause", leverage: "standard" },
          { owner: "Janet", text: "Follow up with Layla on UGC game plan", leverage: "standard" },
          { owner: "Both", text: "Determine Sarah's admin cap per ad account", leverage: "low" },
        ],
      },
      {
        id: 8, icon: "⏱️", title: "Buy Back Your Time", tagline: "Scale yourselves first", color: "#6D28D9",
        tldr: "Janet works 48hrs not 60-70. Will hasn't tracked at all. Drop low-value recurring commitments. EA hire is ultimately a time-buying play.",
        actions: [
          { owner: "Will", text: "Start time-tracking this week", leverage: "standard" },
          { owner: "Both", text: "Identify 2-3 commitments to drop or delegate", leverage: "high" },
          { owner: "Janet", text: "Move Foxwell/brewing calls to async email", leverage: "low" },
        ],
      },
    ];

    const POINTS = { high: 5, standard: 3, low: 1 };
    const LEVERAGE_LABELS = { high: "HIGH LEVERAGE", standard: "STANDARD", low: "QUICK WIN" };
    const LEVERAGE_COLORS = {
      high:     { bg: "#FEF3C7", text: "#92400E", border: "#FDE68A", dot: "#F59E0B" },
      standard: { bg: "#EFF6FF", text: "#1E40AF", border: "#BFDBFE", dot: "#3B82F6" },
      low:      { bg: "#F0FDF4", text: "#166534", border: "#BBF7D0", dot: "#22C55E" },
    };

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch (e) {}
      return null;
    }

    function saveState(checked) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(checked)); } catch (e) {}
    }

    function App() {
      const [checked, setChecked] = useState(() => loadState() || {});
      const [selected, setSelected] = useState(null);
      const [animKey, setAnimKey] = useState(0);
      const [showConfetti, setShowConfetti] = useState(false);
      const prevDone = useRef(0);

      useEffect(() => { saveState(checked); }, [checked]);

      const isChecked = (pId, aIdx) => !!checked[`${pId}-${aIdx}`];

      const toggle = (pId, aIdx) => {
        const key = `${pId}-${aIdx}`;
        setChecked(prev => {
          const next = { ...prev };
          if (next[key]) delete next[key]; else next[key] = true;
          return next;
        });
      };

      // Scores
      const scores = { Will: 0, Janet: 0 };
      const totalPossible = { Will: 0, Janet: 0 };
      let totalDone = 0, totalActions = 0;

      PILLARS.forEach(p => {
        p.actions.forEach((a, i) => {
          const pts = POINTS[a.leverage];
          totalActions++;
          const owners = a.owner === "Both" ? ["Will", "Janet"] : [a.owner];
          owners.forEach(o => { totalPossible[o] = (totalPossible[o] || 0) + pts; });
          if (isChecked(p.id, i)) {
            totalDone++;
            owners.forEach(o => { scores[o] = (scores[o] || 0) + pts; });
          }
        });
      });

      const pct = totalActions ? Math.round((totalDone / totalActions) * 100) : 0;
      const totalPoints = scores.Will + scores.Janet;
      const maxPoints = totalPossible.Will + totalPossible.Janet;

      // Confetti on 100%
      useEffect(() => {
        if (pct === 100 && prevDone.current < totalActions) setShowConfetti(true);
        prevDone.current = totalDone;
      }, [pct, totalDone]);

      useEffect(() => {
        if (showConfetti) { const t = setTimeout(() => setShowConfetti(false), 3000); return () => clearTimeout(t); }
      }, [showConfetti]);

      const pillarProgress = (p) => {
        const done = p.actions.filter((_, i) => isChecked(p.id, i)).length;
        return { done, total: p.actions.length, pct: p.actions.length ? Math.round((done / p.actions.length) * 100) : 0 };
      };

      const pillarPoints = (p) => {
        let earned = 0, possible = 0;
        p.actions.forEach((a, i) => {
          possible += POINTS[a.leverage];
          if (isChecked(p.id, i)) earned += POINTS[a.leverage];
        });
        return { earned, possible };
      };

      const open = (p) => { setSelected(p); setAnimKey(k => k + 1); };

      const leader = scores.Will >= scores.Janet ? "Will" : "Janet";
      const tied = scores.Will === scores.Janet;

      return (
        <div style={{ minHeight: "100vh", background: "#F8F7F4", color: "#1A1A2E", maxWidth: 960, margin: "0 auto", padding: "0 20px" }}>

          {/* Confetti */}
          {showConfetti && (
            <div style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 999, pointerEvents: "none", display: "flex", justifyContent: "center" }}>
              {Array.from({ length: 24 }).map((_, i) => (
                <div key={i} style={{
                  position: "absolute",
                  top: -10,
                  left: `${8 + Math.random() * 84}%`,
                  width: 8 + Math.random() * 6,
                  height: 8 + Math.random() * 6,
                  borderRadius: Math.random() > 0.5 ? "50%" : "2px",
                  background: ["#E85D04", "#2563EB", "#7C3AED", "#059669", "#DC2626", "#F59E0B"][i % 6],
                  animation: `confetti-fall ${1.5 + Math.random() * 2}s ease-out ${Math.random() * 0.5}s forwards`,
                }} />
              ))}
            </div>
          )}

          {/* HEADER */}
          <header style={{ padding: "36px 0 28px", borderBottom: "1px solid #E5E3DE" }}>
            <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", flexWrap: "wrap", gap: 20 }}>
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 3, color: "#9E9B93", textTransform: "uppercase", fontFamily: "'JetBrains Mono', monospace", marginBottom: 6 }}>
                  SELFMADE
                </div>
                <div style={{ fontSize: 26, fontWeight: 800, color: "#1A1A2E", letterSpacing: -0.5 }}>
                  Mission Control
                </div>
                <div style={{ fontSize: 13, color: "#7C7A72", marginTop: 4 }}>
                  Strategy Sprint &middot; March 2026
                </div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 20 }}>
                <div style={{ textAlign: "right" }}>
                  <div style={{
                    fontSize: 36, fontWeight: 800, fontFamily: "'JetBrains Mono', monospace",
                    color: pct === 100 ? "#16A34A" : "#1A1A2E",
                    lineHeight: 1,
                  }}>
                    {totalPoints}<span style={{ fontSize: 16, color: "#9E9B93", fontWeight: 500 }}>/{maxPoints} pts</span>
                  </div>
                  <div style={{ fontSize: 11, color: "#9E9B93", fontWeight: 600, marginTop: 4 }}>
                    {totalDone}/{totalActions} actions &middot; {pct}% complete
                  </div>
                </div>
              </div>
            </div>

            {/* Progress bar */}
            <div style={{ marginTop: 20, height: 6, background: "#E5E3DE", borderRadius: 6, overflow: "hidden" }}>
              <div style={{
                height: "100%", borderRadius: 6, transition: "width 0.6s cubic-bezier(.4,0,.2,1)",
                background: pct === 100
                  ? "linear-gradient(90deg, #16A34A, #22C55E)"
                  : "linear-gradient(90deg, #1A1A2E, #374151)",
                width: `${pct}%`,
              }} />
            </div>

            {/* LEADERBOARD */}
            <div style={{ display: "flex", gap: 12, marginTop: 20 }}>
              {[
                { name: "Will", emoji: "🧢", pts: scores.Will, max: totalPossible.Will },
                { name: "Janet", emoji: "🔥", pts: scores.Janet, max: totalPossible.Janet },
              ].map(p => {
                const isLeader = !tied && leader === p.name;
                const ratio = p.max ? p.pts / p.max : 0;
                return (
                  <div key={p.name} style={{
                    flex: 1, padding: "16px 18px", borderRadius: 12,
                    background: isLeader ? "#1A1A2E" : "#FFFFFF",
                    color: isLeader ? "#F8F7F4" : "#1A1A2E",
                    border: isLeader ? "2px solid #1A1A2E" : "1px solid #E5E3DE",
                    position: "relative", overflow: "hidden",
                    transition: "all 0.3s ease",
                  }}>
                    {isLeader && (
                      <div style={{
                        position: "absolute", top: 8, right: 10, fontSize: 9, fontWeight: 700,
                        background: "#F59E0B", color: "#1A1A2E", padding: "2px 8px", borderRadius: 4,
                        fontFamily: "'JetBrains Mono', monospace", letterSpacing: 1,
                      }}>
                        LEAD
                      </div>
                    )}
                    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                      <span style={{ fontSize: 22 }}>{p.emoji}</span>
                      <span style={{ fontSize: 15, fontWeight: 700 }}>{p.name}</span>
                    </div>
                    <div style={{ display: "flex", alignItems: "baseline", gap: 4, marginBottom: 8 }}>
                      <span style={{ fontSize: 28, fontWeight: 800, fontFamily: "'JetBrains Mono', monospace" }}>
                        {p.pts}
                      </span>
                      <span style={{ fontSize: 12, color: isLeader ? "#9E9B93" : "#9E9B93", fontWeight: 500 }}>
                        / {p.max} pts
                      </span>
                    </div>
                    <div style={{ height: 4, background: isLeader ? "#374151" : "#E5E3DE", borderRadius: 4, overflow: "hidden" }}>
                      <div style={{
                        height: "100%", borderRadius: 4,
                        background: isLeader ? "#F59E0B" : "#1A1A2E",
                        width: `${ratio * 100}%`,
                        transition: "width 0.5s ease",
                      }} />
                    </div>
                  </div>
                );
              })}
            </div>
          </header>

          {/* CONTENT */}
          <main style={{ padding: "28px 0 60px" }}>
            {!selected ? (
              /* GRID */
              <div style={{
                display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))",
                gap: 14,
              }}>
                {PILLARS.map((p, idx) => {
                  const prog = pillarProgress(p);
                  const pts = pillarPoints(p);
                  const complete = prog.pct === 100;
                  return (
                    <div
                      key={p.id}
                      onClick={() => open(p)}
                      style={{
                        background: complete ? "#F0FDF4" : "#FFFFFF",
                        border: complete ? "1px solid #BBF7D0" : "1px solid #E5E3DE",
                        borderRadius: 14, padding: "20px 18px 16px",
                        cursor: "pointer", transition: "all 0.2s ease",
                        animation: `fadeUp 0.4s cubic-bezier(.4,0,.2,1) ${idx * 0.04}s both`,
                        position: "relative",
                      }}
                      onMouseEnter={e => { e.currentTarget.style.borderColor = p.color; e.currentTarget.style.boxShadow = `0 4px 20px ${p.color}12`; e.currentTarget.style.transform = "translateY(-2px)"; }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor = complete ? "#BBF7D0" : "#E5E3DE"; e.currentTarget.style.boxShadow = "none"; e.currentTarget.style.transform = "translateY(0)"; }}
                    >
                      <div style={{ position: "absolute", top: -6, right: 4, fontSize: 56, fontWeight: 900, color: p.color, opacity: 0.05, lineHeight: 1, fontFamily: "'JetBrains Mono', monospace" }}>
                        {p.id}
                      </div>
                      <div style={{ display: "flex", alignItems: "flex-start", gap: 12, marginBottom: 10 }}>
                        <span style={{ fontSize: 26, lineHeight: 1, flexShrink: 0 }}>{complete ? "✅" : p.icon}</span>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontSize: 15, fontWeight: 700, color: "#1A1A2E", marginBottom: 2 }}>{p.title}</div>
                          <div style={{ fontSize: 12, color: "#9E9B93", fontWeight: 500 }}>{p.tagline}</div>
                        </div>
                      </div>

                      {/* Points badge */}
                      <div style={{
                        display: "inline-flex", alignItems: "center", gap: 4,
                        background: "#F8F7F4", borderRadius: 6, padding: "3px 8px", marginBottom: 10,
                        fontSize: 11, fontWeight: 700, fontFamily: "'JetBrains Mono', monospace", color: pts.earned === pts.possible ? "#16A34A" : "#7C7A72",
                      }}>
                        ⚡ {pts.earned}/{pts.possible} pts
                      </div>

                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <div style={{ flex: 1, height: 4, background: "#F0EFEB", borderRadius: 4, overflow: "hidden" }}>
                          <div style={{
                            height: "100%", borderRadius: 4, transition: "width 0.5s ease",
                            background: complete ? "#22C55E" : p.color, width: `${prog.pct}%`,
                          }} />
                        </div>
                        <span style={{ fontSize: 11, fontWeight: 700, fontFamily: "'JetBrains Mono', monospace", color: complete ? "#16A34A" : "#9E9B93", whiteSpace: "nowrap" }}>
                          {prog.done}/{prog.total}
                        </span>
                      </div>
                    </div>
                  );
                })}
              </div>
            ) : (
              /* DETAIL VIEW */
              <div key={animKey} style={{ animation: "scaleIn 0.3s cubic-bezier(.4,0,.2,1) both" }}>
                <button
                  onClick={() => setSelected(null)}
                  style={{
                    background: "#FFFFFF", border: "1px solid #E5E3DE", borderRadius: 8,
                    padding: "8px 16px", cursor: "pointer", fontSize: 13, fontWeight: 600,
                    color: "#7C7A72", marginBottom: 24, fontFamily: "inherit",
                    display: "inline-flex", alignItems: "center", gap: 6,
                    transition: "all 0.15s",
                  }}
                  onMouseEnter={e => { e.currentTarget.style.borderColor = "#1A1A2E"; e.currentTarget.style.color = "#1A1A2E"; }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor = "#E5E3DE"; e.currentTarget.style.color = "#7C7A72"; }}
                >
                  ← All Pillars
                </button>

                {(() => {
                  const p = PILLARS.find(x => x.id === selected.id);
                  const prog = pillarProgress(p);
                  const pts = pillarPoints(p);
                  const complete = prog.pct === 100;
                  return (
                    <div>
                      {/* Header */}
                      <div style={{
                        background: "#FFFFFF", border: "1px solid #E5E3DE", borderRadius: 16,
                        padding: "28px", marginBottom: 16, position: "relative", overflow: "hidden",
                        borderTop: `4px solid ${p.color}`,
                      }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 16 }}>
                          <span style={{ fontSize: 38, lineHeight: 1 }}>{complete ? "✅" : p.icon}</span>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 2, color: p.color, textTransform: "uppercase", fontFamily: "'JetBrains Mono', monospace", marginBottom: 2 }}>
                              Pillar {p.id}
                            </div>
                            <div style={{ fontSize: 22, fontWeight: 800, color: "#1A1A2E" }}>{p.title}</div>
                          </div>
                          <div style={{
                            background: complete ? "#F0FDF4" : "#F8F7F4", borderRadius: 10, padding: "10px 16px",
                            textAlign: "center", border: complete ? "1px solid #BBF7D0" : "1px solid #E5E3DE",
                          }}>
                            <div style={{ fontSize: 22, fontWeight: 800, fontFamily: "'JetBrains Mono', monospace", color: complete ? "#16A34A" : "#1A1A2E" }}>
                              {pts.earned}
                            </div>
                            <div style={{ fontSize: 10, color: "#9E9B93", fontWeight: 600 }}>/ {pts.possible} pts</div>
                          </div>
                        </div>
                        <div style={{
                          fontSize: 14, lineHeight: 1.75, color: "#4B4A45",
                          background: "#F8F7F4", borderRadius: 10, padding: "14px 18px",
                          borderLeft: `3px solid ${p.color}`,
                        }}>
                          {p.tldr}
                        </div>
                      </div>

                      {/* Legend */}
                      <div style={{ display: "flex", gap: 10, marginBottom: 12, flexWrap: "wrap" }}>
                        {Object.entries(LEVERAGE_LABELS).map(([key, label]) => (
                          <div key={key} style={{
                            display: "flex", alignItems: "center", gap: 6,
                            fontSize: 11, fontWeight: 600, color: LEVERAGE_COLORS[key].text,
                            fontFamily: "'JetBrains Mono', monospace",
                          }}>
                            <div style={{ width: 7, height: 7, borderRadius: "50%", background: LEVERAGE_COLORS[key].dot }} />
                            {label}
                            <span style={{ color: "#9E9B93" }}>= {POINTS[key]} pts</span>
                          </div>
                        ))}
                      </div>

                      {/* Actions */}
                      <div style={{
                        background: "#FFFFFF", border: "1px solid #E5E3DE", borderRadius: 14, overflow: "hidden",
                      }}>
                        {p.actions.map((a, i) => {
                          const done = isChecked(p.id, i);
                          const lev = LEVERAGE_COLORS[a.leverage];
                          return (
                            <div
                              key={i}
                              onClick={() => toggle(p.id, i)}
                              style={{
                                display: "flex", alignItems: "center", gap: 14,
                                padding: "16px 20px", cursor: "pointer",
                                borderBottom: i < p.actions.length - 1 ? "1px solid #F0EFEB" : "none",
                                transition: "background 0.15s",
                                background: done ? "#FAFFF7" : "#FFFFFF",
                                animation: `slideDown 0.3s ease ${i * 0.06}s both`,
                              }}
                              onMouseEnter={e => { if (!done) e.currentTarget.style.background = "#FAFAF8"; }}
                              onMouseLeave={e => { e.currentTarget.style.background = done ? "#FAFFF7" : "#FFFFFF"; }}
                            >
                              {/* Checkbox */}
                              <div style={{
                                width: 24, height: 24, borderRadius: 7, flexShrink: 0,
                                border: done ? "2px solid #22C55E" : "2px solid #D1D0CC",
                                background: done ? "#22C55E" : "#FFFFFF",
                                display: "flex", alignItems: "center", justifyContent: "center",
                                transition: "all 0.2s", fontSize: 14, color: "#FFFFFF", fontWeight: 700,
                                animation: done ? "pulse-ring 0.6s ease" : "none",
                              }}>
                                {done ? "✓" : ""}
                              </div>

                              {/* Leverage tag */}
                              <div style={{
                                background: lev.bg, color: lev.text, border: `1px solid ${lev.border}`,
                                fontSize: 9, fontWeight: 700, padding: "2px 7px", borderRadius: 4,
                                letterSpacing: 0.8, fontFamily: "'JetBrains Mono', monospace",
                                flexShrink: 0, opacity: done ? 0.5 : 1,
                                whiteSpace: "nowrap",
                              }}>
                                +{POINTS[a.leverage]}
                              </div>

                              {/* Owner */}
                              <div style={{
                                background: a.owner === "Both" ? "#F0EFEB" : a.owner === "Will" ? "#1A1A2E" : "#E85D04",
                                color: a.owner === "Both" ? "#4B4A45" : "#FFFFFF",
                                fontSize: 10, fontWeight: 700, padding: "3px 8px", borderRadius: 5,
                                fontFamily: "'JetBrains Mono', monospace", flexShrink: 0,
                                opacity: done ? 0.5 : 1, letterSpacing: 0.5,
                              }}>
                                {a.owner.toUpperCase()}
                              </div>

                              {/* Text */}
                              <div style={{
                                fontSize: 14, fontWeight: 500, flex: 1,
                                color: done ? "#9E9B93" : "#1A1A2E",
                                textDecoration: done ? "line-through" : "none",
                                transition: "all 0.2s",
                              }}>
                                {a.text}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })()}
              </div>
            )}
          </main>

          {/* Footer */}
          <footer style={{
            textAlign: "center", padding: "20px 0 32px",
            borderTop: "1px solid #E5E3DE", fontSize: 12, color: "#C4C1B9",
            fontFamily: "'JetBrains Mono', monospace",
          }}>
            SELFMADE &middot; MISSION CONTROL &middot; MARCH 2026
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
