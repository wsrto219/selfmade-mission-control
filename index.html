function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function load(){try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):null}catch(e){return null}}
function save(d){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}catch(e){}}

/* ─── EDIT MODAL ─── */

  const[owner,setOwner]=useState(action.owner);

    <div className="modal-bg" onClick={onClose}>

        <div style={{padding:"24px 24px 0"}}>
          <div style={{fontSize:16,fontWeight:800,color:"#1A1A2E",marginBottom:20}}>Edit Task</div>
          <label style={{fontSize:11,fontWeight:700,color:"#9E9B93",display:"block",marginBottom:4,fontFamily:"'JetBrains Mono',monospace"}}>TASK</label>

/* ─── TRANSCRIPT MODAL ─── */
function TranscriptModal({pillars,onAddTasks,onClose}){
  const[transcript,setTranscript]=useState("");
  const[loading,setLoading]=useState(false);
  const[preview,setPreview]=useState(null);
  const[error,setError]=useState("");

  const extract=async()=>{
    if(!transcript.trim())return;
    setLoading(true);setError("");setPreview(null);
    try{
      const pillarNames=pillars.map(p=>`${p.id}. ${p.title}`).join("\n");
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:4000,
          messages:[{role:"user",content:`You are extracting action items from a meeting transcript for a marketing agency called SelfMade, run by Will (CEO, tech/product/creative ops) and Janet (growth strategy/media buying/client management).

EXISTING PILLARS:
${pillarNames}

RULES:
- Every task must have exactly ONE owner: "Will" or "Janet" (never "Both")
- If a task involves both people, split it into two specific tasks — one for each person with their specific responsibility
- Assign a leverage level: "high" (strategic, moves the needle), "standard" (important but routine), "low" (quick admin task)
- Match tasks to existing pillars by ID. If a task doesn't fit, use pillar_id: 0 (new pillar needed)
- Be specific and actionable — no vague tasks

Respond ONLY with a JSON array, no markdown, no backticks, no preamble:
[{"pillar_id": 1, "owner": "Will", "text": "specific task", "leverage": "high", "details": "additional context"}]

TRANSCRIPT:
${transcript}`}]
        })
      });
      const data=await res.json();
      const raw=data.content.map(c=>c.text||"").join("");
      const cleaned=raw.replace(/```json|```/g,"").trim();
      const tasks=JSON.parse(cleaned);
      setPreview(tasks);
    }catch(e){
      setError("Failed to extract tasks. Try again or add manually.");
      console.error(e);
    }
    setLoading(false);
  };

  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()} style={{animation:"slideIn 0.2s ease",maxWidth:640}}>
        <div style={{padding:"24px 24px 0"}}>
          <div style={{fontSize:16,fontWeight:800,color:"#1A1A2E",marginBottom:4}}>📝 Paste Transcript</div>
          <div style={{fontSize:12,color:"#9E9B93",marginBottom:16}}>Drop in a call transcript and AI will extract tasks for Will and Janet.</div>
          {!preview?(
            <>
              <textarea className="textarea" value={transcript} onChange={e=>setTranscript(e.target.value)}
                placeholder="Paste your meeting transcript here..." style={{minHeight:200,marginBottom:12}} />
              {error&&<div style={{color:"#DC2626",fontSize:12,marginBottom:12}}>{error}</div>}
            </>
          ):(
            <div style={{marginBottom:16}}>
              <div style={{fontSize:13,fontWeight:700,color:"#1A1A2E",marginBottom:10}}>
                Extracted {preview.length} tasks — review before adding:
              </div>
              <div style={{maxHeight:340,overflowY:"auto",border:"1px solid #E5E3DE",borderRadius:10}}>
                {preview.map((t,i)=>{
                  const pil=pillars.find(p=>p.id===t.pillar_id);
                  return(
                    <div key={i} style={{padding:"10px 14px",borderBottom:i<preview.length-1?"1px solid #F0EFEB":"none",display:"flex",alignItems:"center",gap:8}}>
                      <div style={{
                        background:t.owner==="Will"?"#1A1A2E":"#E85D04",color:"#FFF",
                        fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:4,
                        fontFamily:"'JetBrains Mono',monospace",flexShrink:0,
                      }}>{t.owner.toUpperCase()}</div>
                      <div style={{
                        background:LEV_COLORS[t.leverage]?.bg||"#EFF6FF",
                        color:LEV_COLORS[t.leverage]?.text||"#1E40AF",
                        border:`1px solid ${LEV_COLORS[t.leverage]?.border||"#BFDBFE"}`,
                        fontSize:8,fontWeight:700,padding:"1px 5px",borderRadius:3,
                        fontFamily:"'JetBrains Mono',monospace",flexShrink:0,
                      }}>+{POINTS[t.leverage]||3}</div>
                      <div style={{flex:1,fontSize:12,color:"#1A1A2E"}}>{t.text}</div>
                      <div style={{fontSize:10,color:"#9E9B93",flexShrink:0}}>{pil?pil.title:"New Pillar"}</div>
                      <button onClick={()=>setPreview(prev=>prev.filter((_,j)=>j!==i))} style={{
                        background:"none",border:"none",cursor:"pointer",color:"#DC2626",fontSize:14,padding:"0 4px",
                      }}>×</button>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
        <div style={{padding:"16px 24px 24px",display:"flex",justifyContent:"flex-end",gap:8,borderTop:"1px solid #F0EFEB"}}>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          {!preview?(
            <button className="btn btn-primary" onClick={extract} disabled={loading||!transcript.trim()} style={{opacity:loading||!transcript.trim()?0.5:1,display:"flex",alignItems:"center",gap:6}}>
              {loading&&<span style={{width:14,height:14,border:"2px solid #FFF",borderTopColor:"transparent",borderRadius:"50%",display:"inline-block",animation:"spin 0.6s linear infinite"}}/>}
              {loading?"Extracting...":"Extract Tasks"}
            </button>
          ):(
            <button className="btn btn-primary" onClick={()=>{onAddTasks(preview);onClose()}} disabled={!preview.length} style={{opacity:preview.length?1:0.5}}>
              Add {preview.length} Tasks
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ─── MAIN APP ─── */
function App(){
  const stored=load();
  const[pillars,setPillars]=useState(stored?.pillars||DEFAULT_PILLARS);
  const[checked,setChecked]=useState(stored?.checked||{});
  const[filter,setFilter]=useState("All");
  const[editAction,setEditAction]=useState(null);
  const[editPillarId,setEditPillarId]=useState(null);
  const[addPillarId,setAddPillarId]=useState(null);
  const[showTranscript,setShowTranscript]=useState(false);
  const[showConfetti,setShowConfetti]=useState(false);
  const prevPct=useRef(0);

  useEffect(()=>{save({pillars,checked})},[pillars,checked]);

  const is=(aId)=>!!checked[aId];
  const toggle=(aId)=>setChecked(p=>{const n={...p};n[aId]?delete n[aId]:n[aId]=true;return n});

  // Scores
  const scores={Will:0,Janet:0};const maxPts={Will:0,Janet:0};
  let totalDone=0,totalActions=0;
  pillars.forEach(p=>p.actions.forEach(a=>{
    const pts=POINTS[a.leverage]||3;totalActions++;
    maxPts[a.owner]=(maxPts[a.owner]||0)+pts;
    if(is(a.id)){totalDone++;scores[a.owner]=(scores[a.owner]||0)+pts}
  }));
  const pct=totalActions?Math.round((totalDone/totalActions)*100):0;

  useEffect(()=>{if(pct===100&&prevPct.current<100)setShowConfetti(true);prevPct.current=pct},[pct]);
  useEffect(()=>{if(showConfetti){const t=setTimeout(()=>setShowConfetti(false),3000);return()=>clearTimeout(t)}},[showConfetti]);

  const leader=scores.Will>scores.Janet?"Will":scores.Janet>scores.Will?"Janet":null;

  // Filtered
  const filteredPillars=pillars.map(p=>({
    ...p,
    actions:filter==="All"?p.actions:p.actions.filter(a=>a.owner===filter)
  })).filter(p=>p.actions.length>0);

  // Edit handlers
  const saveAction=(updated)=>{
    setPillars(prev=>prev.map(p=>({...p,actions:p.actions.map(a=>a.id===updated.id?updated:a)})));
    setEditAction(null);
  };
  const deleteAction=(aId)=>{
    setPillars(prev=>prev.map(p=>({...p,actions:p.actions.filter(a=>a.id!==aId)})));
    setChecked(prev=>{const n={...prev};delete n[aId];return n});
    setEditAction(null);
  };
  const addAction=(pillarId,action)=>{
    setPillars(prev=>prev.map(p=>p.id===pillarId?{...p,actions:[...p.actions,action]}:p));
    setAddPillarId(null);
  };

  // Transcript bulk add
  const addFromTranscript=(tasks)=>{
    setPillars(prev=>{
      const next=[...prev.map(p=>({...p,actions:[...p.actions]}))];
      tasks.forEach(t=>{
        const action={id:uid(),owner:t.owner,text:t.text,leverage:t.leverage||"standard",details:t.details||""};
        const pillar=next.find(p=>p.id===t.pillar_id);
        if(pillar){pillar.actions.push(action)}
        else if(next.length>0){next[next.length-1].actions.push(action)}
      });
      return next;
    });
  };

  return(
    <div style={{minHeight:"100vh",background:"#F8F7F4",color:"#1A1A2E"}}>

      {showConfetti&&(
        <div style={{position:"fixed",top:0,left:0,right:0,zIndex:999,pointerEvents:"none"}}>
          {Array.from({length:30}).map((_,i)=>(
            <div key={i} style={{
              position:"absolute",top:-10,left:`${5+Math.random()*90}%`,
              width:7+Math.random()*7,height:7+Math.random()*7,
              borderRadius:Math.random()>0.5?"50%":"2px",
              background:["#E85D04","#2563EB","#7C3AED","#059669","#DC2626","#F59E0B"][i%6],
              animation:`confetti-fall ${1.5+Math.random()*2}s ease-out ${Math.random()*0.6}s forwards`,
            }}/>
          ))}
        </div>
      )}

      {/* MODALS */}
      {editAction&&<EditModal action={editAction} onSave={saveAction} onDelete={()=>deleteAction(editAction.id)} onClose={()=>setEditAction(null)}/>}
      {addPillarId!==null&&<AddModal pillarId={addPillarId} onSave={a=>addAction(addPillarId,a)} onClose={()=>setAddPillarId(null)}/>}
      {showTranscript&&<TranscriptModal pillars={pillars} onAddTasks={addFromTranscript} onClose={()=>setShowTranscript(false)}/>}

      {/* STICKY HEADER */}
      <div style={{position:"sticky",top:0,zIndex:100,background:"#F8F7F4",borderBottom:"1px solid #E5E3DE"}}>
        <div style={{maxWidth:800,margin:"0 auto",padding:"12px 20px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
            <div>
              <div style={{fontSize:9,fontWeight:700,letterSpacing:3,color:"#9E9B93",fontFamily:"'JetBrains Mono',monospace"}}>SELFMADE</div>
              <div style={{fontSize:16,fontWeight:800,color:"#1A1A2E",letterSpacing:-0.3}}>Mission Control</div>
            </div>
            <div style={{display:"flex",gap:6}}>
              {[{name:"Will",emoji:"🧢",pts:scores.Will,max:maxPts.Will},{name:"Janet",emoji:"🔥",pts:scores.Janet,max:maxPts.Janet}].map(p=>{
                const isLead=leader===p.name;
                return(
                  <div key={p.name} style={{
                    display:"flex",alignItems:"center",gap:6,padding:"5px 12px",borderRadius:8,
                    background:isLead?"#1A1A2E":"#FFF",color:isLead?"#F8F7F4":"#1A1A2E",
                    border:isLead?"none":"1px solid #E5E3DE",transition:"all 0.3s",
                  }}>
                    <span style={{fontSize:14}}>{p.emoji}</span>
                    <span style={{fontSize:12,fontWeight:700}}>{p.name}</span>
                    <span style={{fontSize:13,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:isLead?"#F59E0B":"#7C7A72"}}>{p.pts}</span>
                    <span style={{fontSize:9,color:isLead?"#6B7280":"#C4C1B9"}}>/{p.max}</span>
                  </div>
                );
              })}
            </div>
            <div style={{fontSize:11,color:"#9E9B93",fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}>
              {totalDone}/{totalActions} · {pct}%
            </div>
          </div>
          <div style={{marginTop:8,height:3,background:"#E5E3DE",borderRadius:3,overflow:"hidden"}}>
            <div style={{
              height:"100%",borderRadius:3,transition:"width 0.6s cubic-bezier(.4,0,.2,1)",
              background:pct===100?"repeating-linear-gradient(45deg,#16A34A,#16A34A 10px,#22C55E 10px,#22C55E 20px)":"linear-gradient(90deg,#1A1A2E,#374151)",
              backgroundSize:pct===100?"40px 40px":"auto",
              animation:pct===100?"stripe-complete 1s linear infinite":"none",width:`${pct}%`,
            }}/>
          </div>
        </div>
      </div>

      {/* TOOLBAR */}
      <div style={{maxWidth:800,margin:"0 auto",padding:"16px 20px 0"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
          {/* Filter tabs */}
          <div style={{display:"flex",gap:4,background:"#EFEEEA",borderRadius:10,padding:3}}>
            {["All","Will","Janet"].map(f=>(
              <button key={f} onClick={()=>setFilter(f)} className="btn" style={{
                background:filter===f?"#FFF":"transparent",
                color:filter===f?"#1A1A2E":"#9E9B93",
                padding:"6px 16px",fontSize:12,fontWeight:700,borderRadius:8,
                boxShadow:filter===f?"0 1px 3px rgba(0,0,0,0.06)":"none",
              }}>{f==="All"?"All":f==="Will"?"🧢 Will":"🔥 Janet"}</button>
            ))}
          </div>
          {/* Actions */}
          <div style={{display:"flex",gap:6}}>
            <button className="btn btn-ghost btn-sm" onClick={()=>setShowTranscript(true)} style={{display:"flex",alignItems:"center",gap:4}}>
              📝 Paste Transcript
            </button>
          </div>
        </div>
      </div>

      {/* PILLARS */}
      <div style={{maxWidth:800,margin:"0 auto",padding:"16px 20px 80px"}}>
        {filteredPillars.map((p,pIdx)=>{
          const allActions=pillars.find(x=>x.id===p.id).actions;
          const done=allActions.filter(a=>is(a.id)).length;
          const complete=done===allActions.length&&allActions.length>0;
          let earned=0,possible=0;
          allActions.forEach(a=>{possible+=POINTS[a.leverage]||3;if(is(a.id))earned+=POINTS[a.leverage]||3});

          return(
            <div key={p.id} style={{
              marginBottom:16,background:complete?"#FAFFF7":"#FFF",
              border:complete?"1px solid #BBF7D0":"1px solid #E5E3DE",
              borderRadius:14,overflow:"hidden",
              animation:`fadeUp 0.35s cubic-bezier(.4,0,.2,1) ${pIdx*0.04}s both`,transition:"all 0.3s",
            }}>
              {/* Header */}
              <div style={{
                padding:"14px 20px",borderBottom:`1px solid ${complete?"#BBF7D0":"#F0EFEB"}`,
                display:"flex",alignItems:"center",gap:12,
              }}>
                <span style={{fontSize:22,lineHeight:1}}>{complete?"✅":p.icon}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    <span style={{fontSize:14,fontWeight:800,color:"#1A1A2E"}}>{p.title}</span>
                    <span style={{fontSize:10,fontWeight:600,color:"#9E9B93",fontFamily:"'JetBrains Mono',monospace"}}>{done}/{allActions.length}</span>
                  </div>
                  <div style={{fontSize:12,color:"#9E9B93",marginTop:1,lineHeight:1.4}}>{p.tldr}</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{
                    fontSize:13,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",
                    color:complete?"#16A34A":"#1A1A2E",background:complete?"#DCFCE7":"#F8F7F4",
                    padding:"4px 10px",borderRadius:6,whiteSpace:"nowrap",
                  }}>⚡{earned}/{possible}</div>
                </div>
              </div>

              {/* Actions */}
              {p.actions.map((a,i)=>{
                const d=is(a.id);
                const lev=LEV_COLORS[a.leverage]||LEV_COLORS.standard;
                return(
                  <div key={a.id} style={{borderBottom:i<p.actions.length-1?`1px solid ${complete?"#E6F9E6":"#F5F4F0"}`:"none"}}>
                    <div style={{
                      display:"flex",alignItems:"center",gap:10,padding:"11px 20px",
                      background:d?(complete?"#F0FDF4":"#FAFFF7"):"transparent",transition:"background 0.12s",
                    }}>
                      {/* Checkbox */}
                      <div onClick={()=>toggle(a.id)} style={{
                        width:20,height:20,borderRadius:5,flexShrink:0,cursor:"pointer",
                        border:d?"2px solid #22C55E":"2px solid #D1D0CC",
                        background:d?"#22C55E":"#FFF",
                        display:"flex",alignItems:"center",justifyContent:"center",
                        transition:"all 0.2s",fontSize:12,color:"#FFF",fontWeight:700,
                        animation:d?"pulse-ring 0.5s ease":"none",
                      }}>{d?"✓":""}</div>

                      {/* Points */}
                      <div style={{
                        background:lev.bg,color:lev.text,border:`1px solid ${lev.border}`,
                        fontSize:9,fontWeight:700,padding:"1px 5px",borderRadius:3,
                        fontFamily:"'JetBrains Mono',monospace",flexShrink:0,opacity:d?0.4:1,
                      }}>+{POINTS[a.leverage]||3}</div>

                      {/* Owner */}
                      <div style={{
                        background:a.owner==="Will"?"#1A1A2E":"#E85D04",color:"#FFF",
                        fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:4,
                        fontFamily:"'JetBrains Mono',monospace",flexShrink:0,
                        opacity:d?0.4:1,letterSpacing:0.5,
                      }}>{a.owner.toUpperCase()}</div>

                      {/* Text */}
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{
                          fontSize:13,fontWeight:500,color:d?"#B0AEA6":"#1A1A2E",
                          textDecoration:d?"line-through":"none",transition:"all 0.2s",
                        }}>{a.text}</div>
                        {a.details&&(
                          <div style={{fontSize:11,color:"#9E9B93",marginTop:2,lineHeight:1.4}}>{a.details}</div>
                        )}
                      </div>

                      {/* Edit button */}
                      <button onClick={()=>{setEditAction(a);setEditPillarId(p.id)}} style={{
                        background:"none",border:"none",cursor:"pointer",color:"#C4C1B9",
                        fontSize:14,padding:"2px 6px",borderRadius:4,transition:"color 0.15s",flexShrink:0,
                      }} onMouseEnter={e=>e.currentTarget.style.color="#1A1A2E"} onMouseLeave={e=>e.currentTarget.style.color="#C4C1B9"}>
                        ✎
                      </button>
                    </div>
                  </div>
                );
              })}

              {/* Add task button */}
              <div onClick={()=>setAddPillarId(p.id)} style={{
                padding:"10px 20px",cursor:"pointer",display:"flex",alignItems:"center",gap:6,
                color:"#9E9B93",fontSize:12,fontWeight:600,transition:"all 0.15s",
                borderTop:`1px solid ${complete?"#E6F9E6":"#F5F4F0"}`,
              }} onMouseEnter={e=>{e.currentTarget.style.color="#1A1A2E";e.currentTarget.style.background="#FAFAF8"}}
                 onMouseLeave={e=>{e.currentTarget.style.color="#9E9B93";e.currentTarget.style.background="transparent"}}>
                <span style={{fontSize:15}}>+</span> Add task
              </div>
            </div>
          );
        })}
      </div>

      <div style={{
        textAlign:"center",padding:"20px 0 36px",borderTop:"1px solid #E5E3DE",
        fontSize:11,color:"#C4C1B9",fontFamily:"'JetBrains Mono',monospace",letterSpacing:1,
      }}>SELFMADE · MISSION CONTROL · MARCH 2026</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
